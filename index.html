<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 4h Paper Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --txt:#e6edf3;
          --dim:#8b949e; --green:#3fb950; --red:#f85149; --blue:#58a6ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--txt);
         font-family:-apple-system,"Segoe UI",Roboto,sans-serif; padding:24px; }
  h1 { font-size:20px; margin-bottom:4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:20px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
           gap:12px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--border);
          border-radius:8px; padding:14px; }
  .card .label { color:var(--dim); font-size:12px; margin-bottom:6px; }
  .card .value { font-size:22px; font-weight:600; }
  .green { color:var(--green); } .red { color:var(--red); } .blue { color:var(--blue); }
  .panel { background:var(--card); border:1px solid var(--border);
           border-radius:8px; padding:16px; margin-bottom:20px; }
  .panel h2 { font-size:14px; color:var(--dim); margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--dim); font-weight:500; padding:6px 8px;
       border-bottom:1px solid var(--border); }
  td { padding:6px 8px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  .err { color:var(--red); padding:20px; }
  canvas { max-height:280px; }
</style>
</head>
<body>
<h1>BTC/USD — 4h trend strategija (paper)</h1>
<div class="sub" id="updated">Učitavanje…</div>

<div class="cards">
  <div class="card"><div class="label">Kapital</div><div class="value" id="equity">—</div></div>
  <div class="card"><div class="label">P&amp;L ukupno</div><div class="value" id="pnl">—</div></div>
  <div class="card"><div class="label">Pozicija</div><div class="value" id="pos">—</div></div>
  <div class="card"><div class="label">BTC cena</div><div class="value" id="price">—</div></div>
  <div class="card"><div class="label">Broj trejdova</div><div class="value" id="ntrades">—</div></div>
  <div class="card"><div class="label">Win rate</div><div class="value" id="winrate">—</div></div>
</div>

<div class="panel">
  <h2>Equity kriva</h2>
  <canvas id="chart"></canvas>
</div>

<div class="panel">
  <h2>Istorija trejdova</h2>
  <div style="overflow-x:auto">
    <table id="trades">
      <thead><tr><th>Vreme (UTC)</th><th>Događaj</th><th>Smer</th>
                 <th>Cena</th><th>P&amp;L</th><th>Kapital</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const START = 100.0;
const bust = "?t=" + Date.now();   // bez kesa

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  return lines.slice(1).map(l => {
    const p = l.split(",");
    return { time:p[0], event:p[1], dir:p[2],
             price:+p[3], pnl:+p[4], equity:+p[5] };
  });
}

async function load() {
  let state = null, rows = [];
  try {
    state = await (await fetch("paper_state.json" + bust)).json();
  } catch(e) {}
  try {
    const t = await (await fetch("paper_log.csv" + bust)).text();
    if (t.trim().startsWith("candle_utc")) rows = parseCSV(t);
  } catch(e) {}

  if (!state) {
    document.getElementById("updated").innerHTML =
      "<span class='err'>Još nema podataka — sačekaj prvo pokretanje Actions workflow-a.</span>";
    return;
  }

  const eq = state.equity, pnl = eq - START;
  document.getElementById("equity").textContent = "$" + eq.toFixed(2);
  const pnlEl = document.getElementById("pnl");
  pnlEl.textContent = (pnl >= 0 ? "+" : "") + pnl.toFixed(2) +
                      " (" + (pnl / START * 100).toFixed(1) + "%)";
  pnlEl.className = "value " + (pnl >= 0 ? "green" : "red");
  const posEl = document.getElementById("pos");
  if (state.pos === 1) {
    posEl.textContent = "LONG @ " + state.entry.toFixed(0);
    posEl.className = "value blue";
  } else { posEl.textContent = "flat"; }
  if (state.last_price)
    document.getElementById("price").textContent = "$" + state.last_price.toFixed(0);
  document.getElementById("updated").textContent =
    "Poslednje ažuriranje: " + (state.updated_utc || "?") + " UTC — automatski na svaka 4h";

  const closes = rows.filter(r => r.event.startsWith("CLOSE"));
  document.getElementById("ntrades").textContent = closes.length;
  if (closes.length) {
    const w = closes.filter(r => r.pnl > 0).length;
    document.getElementById("winrate").textContent =
      (w / closes.length * 100).toFixed(0) + "%";
  }

  // tabela (najnovije prvo)
  const tb = document.querySelector("#trades tbody");
  tb.innerHTML = "";
  [...rows].reverse().forEach(r => {
    const tr = document.createElement("tr");
    const cls = r.pnl > 0 ? "green" : (r.pnl < 0 ? "red" : "");
    tr.innerHTML = `<td>${r.time}</td><td>${r.event}</td><td>${r.dir}</td>
      <td>${r.price.toFixed(2)}</td>
      <td class="${cls}">${r.pnl ? (r.pnl>0?"+":"")+r.pnl.toFixed(2) : "—"}</td>
      <td>${r.equity.toFixed(2)}</td>`;
    tb.appendChild(tr);
  });
  if (!rows.length)
    tb.innerHTML = "<tr><td colspan='6' style='color:var(--dim)'>Još nema trejdova — strategija čeka signal (u proseku 1–2 mesečno).</td></tr>";

  // equity kriva
  const pts = [{x:"start", y:START}];
  closes.forEach(r => pts.push({x:r.time, y:r.equity}));
  new Chart(document.getElementById("chart"), {
    type: "line",
    data: { labels: pts.map(p=>p.x),
            datasets: [{ data: pts.map(p=>p.y), borderColor:"#58a6ff",
                         backgroundColor:"rgba(88,166,255,.1)", fill:true,
                         tension:.25, pointRadius:3 }] },
    options: { plugins:{legend:{display:false}},
               scales: { x:{ticks:{color:"#8b949e",maxTicksLimit:8},grid:{color:"#21262d"}},
                         y:{ticks:{color:"#8b949e"},grid:{color:"#21262d"}} } }
  });
}
load();
</script>
</body>
</html>
